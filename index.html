<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SparkEdge — Client Portal</title>
  <link rel="icon" type="image/x-icon" href="./favicons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./favicons/apple-touch-icon-180x180.png">
  <link rel="manifest" href="./favicons/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="SparkEdge">
  <meta name="apple-mobile-web-app-title" content="SparkEdge">
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="login-page">

  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="brand">
        <div class="brand-icon">
          <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
            <polygon points="14,2 26,20 2,20" fill="url(#lg)"/>
            <defs>
              <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FF6B35"/>
                <stop offset="100%" style="stop-color:#FF3CAC"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">SparkEdge</span>
      </div>

      <h1 class="login-title">Client Portal</h1>
      <p class="login-sub">Enter your unique Ticket ID to access your private project dashboard.</p>

      <div class="input-group">
        <label for="ticketInput">Your Ticket ID</label>
        <input
          type="text"
          id="ticketInput"
          placeholder="e.g. SE-001"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button class="btn-primary" id="accessBtn" onclick="accessPortal()">
        Access My Dashboard
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <p id="errorMsg" class="error-msg" style="display:none">
        ⚠️ Invalid Ticket ID. Please check with your project manager.
      </p>

      <div class="login-footer">
        Need help? &nbsp;<a href="mailto:sparkedge555@gmail.com">sparkedge555@gmail.com</a>
      </div>

    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════
       FIREBASE CONFIG
    ══════════════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey: "AIzaSyA0rufGe1NcKnsalr7VFnIuRLwfjPyD0QE",
      authDomain: "sparkedge-client-portal.firebaseapp.com",
      projectId: "sparkedge-client-portal",
      storageBucket: "sparkedge-client-portal.firebasestorage.app",
      messagingSenderId: "848868473172",
      appId: "1:848868473172:web:2111dd537b9bc7549370c1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    /* ══════════════════════════════════════════════════════
       ENTER KEY SUPPORT
    ══════════════════════════════════════════════════════ */
    document.getElementById('ticketInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') accessPortal();
    });

    /* ══════════════════════════════════════════════════════
       PORTAL ACCESS — checks Firestore, no hardcoded array
    ══════════════════════════════════════════════════════ */
    async function accessPortal() {
      const input    = document.getElementById('ticketInput').value.trim().toUpperCase();
      const errorMsg = document.getElementById('errorMsg');
      const btn      = document.getElementById('accessBtn');

      if (!input) {
        errorMsg.textContent = '⚠️ Please enter your Ticket ID.';
        errorMsg.style.display = 'block';
        shake();
        return;
      }

      // Show loading state
      btn.textContent = 'Checking...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const doc = await db.collection('clients').doc(input).get();

        if (doc.exists) {
          // Valid ticket — redirect to universal dashboard
          window.location.href = `dashboard.html?id=${input}`;
        } else {
          errorMsg.textContent = '⚠️ Invalid Ticket ID. Please check with your project manager.';
          errorMsg.style.display = 'block';
          shake();
          btn.textContent = 'Access My Dashboard';
          btn.disabled = false;
          // Restore button arrow icon
          btn.innerHTML = 'Access My Dashboard <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }
      } catch (e) {
        errorMsg.textContent = '⚠️ Connection error. Please try again.';
        errorMsg.style.display = 'block';
        btn.innerHTML = 'Access My Dashboard <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        btn.disabled = false;
      }
    }

    function shake() {
      const inp = document.getElementById('ticketInput');
      inp.classList.add('shake');
      setTimeout(() => inp.classList.remove('shake'), 500);
    }
  </script>

</body>
</html>
